name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      # Steps below are no-ops until the scripts exist (--if-present), then they
      # start gating automatically as each phase adds typecheck / build. `test`
      # is always run: it is the merge gate for the test-critical surfaces.
      - run: npm run typecheck --if-present
      - run: npm test
      - run: npm run build --if-present
